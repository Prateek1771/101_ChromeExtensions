<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev Dark Mode</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Dev Dark Mode</h1>
      <p class="subtitle">Comfortable browsing, day or night</p>

      <div class="toggle-row">
        <span class="toggle-label" id="status-text">Off</span>
        <label class="switch">
          <input type="checkbox" id="toggle" />
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
