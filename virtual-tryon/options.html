<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Virtual Try-On - Options</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      background: #0a0a0f;
      color: #f0f0f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 24px;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124, 58, 237, 0.12) 0%, transparent 60%);
    }
    h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .desc {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      margin-bottom: 6px;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: #f0f0f5;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus {
      border-color: rgba(124, 58, 237, 0.5);
    }
    input[type="text"]::placeholder {
      color: rgba(255,255,255,0.3);
    }
    .btn {
      margin-top: 12px;
      padding: 9px 20px;
      border-radius: 10px;
      border: none;
      font-weight: 600;
      font-size: 13px;
      color: white;
      background: linear-gradient(to right, #9333ea, #3b82f6);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover { box-shadow: 0 0 20px rgba(124, 58, 237, 0.3); }
    .status {
      margin-top: 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      min-height: 16px;
    }
    .status.success { color: #4ade80; }
  </style>
</head>
<body>
  <h2>API Settings</h2>
  <p class="desc">Enter your API4AI key for production access, or leave blank to use the free demo endpoint.</p>
  <label for="apiKey">API4AI API Key</label>
  <input type="text" id="apiKey" placeholder="Leave blank for demo endpoint">
  <button class="btn" id="saveBtn">Save</button>
  <div class="status" id="status"></div>
  <script src="options.js"></script>
</body>
</html>
