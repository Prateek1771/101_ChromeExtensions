<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consistency Tracker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-left">
        <div class="date" id="current-date"></div>
        <div class="time" id="current-time"></div>
      </div>
      <div class="header-right">
        <div class="streak" id="streak-display" title="Current streak">
          <span class="streak-icon">&#128293;</span>
          <span id="streak-count">0</span>
        </div>
        <button class="icon-btn" id="manage-btn" title="Manage tasks">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </button>
      </div>
    </header>

    <section class="heatmap-section" id="heatmap-container"></section>

    <section class="tasks-section">
      <h2>Today's Tasks</h2>
      <div id="tasks-list"></div>
      <div id="no-tasks" class="no-tasks-msg" style="display:none;">
        No tasks for today. <a href="#" id="add-tasks-link">Add some!</a>
      </div>
    </section>
  </div>

  <script src="storage.js"></script>
  <script src="heatmap.js"></script>
  <script src="popup.js"></script>
</body>
</html>
