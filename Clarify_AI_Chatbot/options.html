<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarify - Settings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #111;
            color: #e5e5e5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: #1a1a1a;
            border: 1px solid #262626;
            border-radius: 12px;
            padding: 36px;
            width: 400px;
        }
        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #fff;
        }
        .subtitle {
            font-size: 13px;
            color: #777;
            margin-bottom: 28px;
        }
        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            color: #888;
        }
        input[type="password"] {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #111;
            color: #e5e5e5;
            font-size: 14px;
            font-family: 'SF Mono', 'Consolas', monospace;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus { border-color: #555; }
        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            margin-bottom: 24px;
        }
        .help-text a {
            color: #aaa;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .help-text a:hover { color: #fff; }
        button {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #111;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        button:hover { opacity: 0.85; }
        .message {
            margin-top: 16px;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }
        .message.success {
            display: block;
            background: #1a2e1a;
            color: #8c8;
            border: 1px solid #2a3e2a;
        }
        .message.error {
            display: block;
            background: #2e1a1a;
            color: #e55;
            border: 1px solid #3e2a2a;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Clarify Settings</h1>
        <p class="subtitle">Configure your Groq API key to start chatting with web pages.</p>

        <label for="api-key">API Key</label>
        <input type="password" id="api-key" placeholder="gsk_...">
        <p class="help-text">
            Get your free API key at
            <a href="https://console.groq.com/keys" target="_blank">console.groq.com</a>
        </p>

        <button id="save-btn">Save Key</button>
        <div id="message"></div>
    </div>

    <script>
        const keyInput = document.getElementById('api-key');
        const saveBtn = document.getElementById('save-btn');
        const messageEl = document.getElementById('message');

        chrome.storage.sync.get(['GROQ_API_KEY'], (result) => {
            if (result.GROQ_API_KEY) {
                keyInput.value = result.GROQ_API_KEY;
            }
        });

        saveBtn.addEventListener('click', () => {
            const key = keyInput.value.trim();
            if (!key) {
                messageEl.className = 'message error';
                messageEl.textContent = 'Please enter an API key.';
                return;
            }
            chrome.storage.sync.set({ GROQ_API_KEY: key }, () => {
                messageEl.className = 'message success';
                messageEl.textContent = 'API key saved successfully!';
                setTimeout(() => { messageEl.style.display = 'none'; }, 3000);
            });
        });
    </script>
</body>
</html>
