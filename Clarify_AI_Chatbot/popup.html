<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarify</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            width: 420px;
            height: 520px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #111;
            color: #e5e5e5;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 18px;
            background: #111;
            border-bottom: 1px solid #222;
            flex-shrink: 0;
        }
        .header img {
            width: 30px;
            height: 30px;
            border-radius: 8px;
        }
        .header-text h1 {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.3px;
        }
        .header-text .status {
            font-size: 11px;
            color: #666;
            margin-top: 1px;
        }
        .header-text .status.ready {
            color: #8c8;
        }
        .setup {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px 32px;
        }
        .setup.hidden { display: none; }
        .setup-icon {
            font-size: 32px;
            margin-bottom: 16px;
            filter: grayscale(1);
        }
        .setup h2 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 4px;
        }
        .setup .sub {
            font-size: 13px;
            color: #777;
            margin-bottom: 28px;
            line-height: 1.5;
        }
        .setup .sub a {
            color: #aaa;
            text-decoration: underline;
            text-underline-offset: 2px;
        }
        .setup .sub a:hover { color: #fff; }
        .setup label {
            font-size: 11px;
            font-weight: 600;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }
        .setup input {
            width: 100%;
            padding: 11px 14px;
            border: 1px solid #333;
            border-radius: 8px;
            background: #1a1a1a;
            color: #e5e5e5;
            font-size: 13px;
            font-family: 'SF Mono', 'Consolas', monospace;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 16px;
        }
        .setup input:focus { border-color: #555; }
        .setup input::placeholder { color: #444; }
        .setup button {
            width: 100%;
            padding: 11px;
            background: #fff;
            color: #111;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .setup button:hover { opacity: 0.85; }
        .setup .error-msg {
            color: #e55;
            font-size: 12px;
            margin-top: 12px;
        }

        .chat-view { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .chat-view.hidden { display: none; }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-track { background: transparent; }
        .messages::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

        .msg {
            max-width: 88%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .msg.user {
            align-self: flex-end;
            background: #fff;
            color: #111;
            border-bottom-right-radius: 4px;
        }

        .msg.assistant {
            align-self: flex-start;
            background: #1a1a1a;
            color: #ddd;
            border: 1px solid #262626;
            border-bottom-left-radius: 4px;
        }

        .msg.assistant p { margin-bottom: 8px; }
        .msg.assistant p:last-child { margin-bottom: 0; }
        .msg.assistant strong { color: #fff; font-weight: 600; }
        .msg.assistant em { color: #bbb; font-style: italic; }
        .msg.assistant code {
            background: #262626;
            padding: 1px 5px;
            border-radius: 4px;
            font-family: 'SF Mono', 'Consolas', monospace;
            font-size: 12px;
            color: #ccc;
        }
        .msg.assistant pre {
            background: #0d0d0d;
            border: 1px solid #262626;
            border-radius: 6px;
            padding: 10px 12px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .msg.assistant pre code {
            background: none;
            padding: 0;
            font-size: 12px;
            color: #bbb;
        }
        .msg.assistant ul, .msg.assistant ol {
            padding-left: 18px;
            margin: 6px 0;
        }
        .msg.assistant li {
            margin-bottom: 4px;
        }
        .msg.assistant h1, .msg.assistant h2, .msg.assistant h3 {
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            margin: 10px 0 4px 0;
        }
        .msg.assistant blockquote {
            border-left: 3px solid #444;
            padding-left: 10px;
            color: #999;
            margin: 6px 0;
        }
        .msg.assistant hr {
            border: none;
            border-top: 1px solid #333;
            margin: 10px 0;
        }

        .msg.system {
            align-self: center;
            background: transparent;
            color: #666;
            font-size: 12px;
            text-align: center;
            padding: 4px 12px;
        }

        .typing {
            display: flex;
            gap: 5px;
            align-items: center;
            padding: 12px 14px;
            align-self: flex-start;
        }
        .typing span {
            width: 6px;
            height: 6px;
            background: #555;
            border-radius: 50%;
            animation: pulse 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes pulse {
            0%, 60%, 100% { opacity: 0.3; transform: scale(1); }
            30% { opacity: 1; transform: scale(1.2); }
        }

        .input-bar {
            display: flex;
            gap: 8px;
            padding: 12px 18px 14px;
            background: #111;
            border-top: 1px solid #222;
            flex-shrink: 0;
        }
        .input-bar input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #333;
            border-radius: 10px;
            background: #1a1a1a;
            color: #e5e5e5;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-bar input:focus { border-color: #555; }
        .input-bar input::placeholder { color: #555; }
        .input-bar input:disabled { opacity: 0.4; }
        .input-bar button {
            padding: 10px 20px;
            background: #fff;
            color: #111;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .input-bar button:hover:not(:disabled) { opacity: 0.85; }
        .input-bar button:disabled { opacity: 0.3; cursor: default; }
    </style>
</head>
<body>
    <div class="header">
        <img src="logo.png" alt="Logo">
        <div class="header-text">
            <h1>Clarify</h1>
            <div id="status" class="status">Loading page content...</div>
        </div>
    </div>

    <!-- Setup screen -->
    <div id="setup" class="setup hidden">
        <div class="setup-icon">&#128274;</div>
        <h2>Set up your API key</h2>
        <p class="sub">Paste your Groq API key below to start chatting.<br>Get a free key at <a href="https://console.groq.com/keys" target="_blank">console.groq.com</a></p>
        <label for="key-input">API Key</label>
        <input type="password" id="key-input" placeholder="gsk_...">
        <button id="save-key-btn">Continue</button>
        <div id="key-error" class="error-msg"></div>
    </div>

    <!-- Chat view -->
    <div id="chat-view" class="chat-view hidden">
        <div id="messages" class="messages"></div>
        <div class="input-bar">
            <input type="text" id="user-input" placeholder="Ask about this page..." disabled>
            <button id="send-btn" disabled>Send</button>
        </div>
    </div>

    <script src="markdown.js"></script>
    <script src="api.js"></script>
    <script src="ui.js"></script>
    <script src="popup.js"></script>
</body>
</html>
