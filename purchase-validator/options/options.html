<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Purchase Validator - Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      padding: 60px 20px;
      color: #333;
    }
    .container {
      background: #fff;
      border-radius: 12px;
      padding: 32px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p.subtitle { color: #666; font-size: 14px; margin-bottom: 24px; }
    label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: #6c5ce7; }
    .help-text {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
    }
    .help-text a { color: #6c5ce7; }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: #6c5ce7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #5b4bd5; }
    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      display: none;
    }
    .status.success { display: block; background: #d4edda; color: #155724; }
    .status.error { display: block; background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Purchase Validator Settings</h1>
    <p class="subtitle">Configure your AI-powered purchase advisor</p>
    <label for="apiKey">Groq API Key</label>
    <input type="text" id="apiKey" placeholder="gsk_...">
    <p class="help-text">Get a free API key at <a href="https://console.groq.com/keys" target="_blank">console.groq.com/keys</a></p>
    <button id="saveBtn">Save API Key</button>
    <div class="status" id="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
